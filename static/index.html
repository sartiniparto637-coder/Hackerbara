<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BARA - DARK TOOL</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-black text-red-400 font-mono min-h-screen flex flex-col items-center justify-center p-4">
  <div class="w-full max-w-2xl bg-gray-900/70 border border-red-900/50 rounded-xl shadow-2xl shadow-red-950/60 p-8">
    <h1 class="text-5xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-red-600 to-purple-800 mb-6 glitch">
      BARA DARK TOOL
    </h1>
    <p class="text-center text-red-600 mb-8">FUCK THE SYSTEM - NO MERCY</p>

    <div class="space-y-6">
      <input id="target" type="text" placeholder="TARGET URL (https://anjing.com)" class="w-full px-5 py-4 bg-gray-800 border border-red-800 rounded-lg text-red-300 focus:outline-none focus:border-red-600">
      
      <div class="grid grid-cols-2 gap-4">
        <input id="threads" type="number" value="10" placeholder="Threads" class="w-full px-5 py-4 bg-gray-800 border border-red-800 rounded-lg text-red-300">
        <input id="duration" type="number" value="60" placeholder="Duration (s)" class="w-full px-5 py-4 bg-gray-800 border border-red-800 rounded-lg text-red-300">
      </div>

      <div class="flex gap-4">
        <button id="startBtn" class="flex-1 bg-red-900 hover:bg-red-700 text-white font-bold py-4 px-6 rounded-lg transition transform hover:scale-105">
          START ATTACK 🔥
        </button>
        <button id="stopBtn" class="flex-1 bg-gray-700 hover:bg-gray-600 text-gray-400 font-bold py-4 px-6 rounded-lg cursor-not-allowed" disabled>
          STOP
        </button>
      </div>

      <div id="log" class="bg-gray-950 p-4 rounded-lg text-green-400 min-h-[100px] overflow-y-auto font-mono text-sm">
        Ready to fuck shit up...
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
