<!DOCTYPE html>
<html>
<head>
<title>Voice AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top">🎤 Voice AI</div>

<div id="chat"></div>

<button class="mic" onclick="talk()">🎙</button>

<script>
function bubble(t,me){
 chat.innerHTML += `<div class="${me?'me':'ai'}">${t}</div>`
 chat.scrollTop = chat.scrollHeight
}

function talk(){

 let rec
 navigator.mediaDevices.getUserMedia({audio:true})
 .then(stream=>{

 rec = new MediaRecorder(stream)

 rec.ondataavailable = async e=>{

 let text = "halo" // dummy contoh

 bubble(text,true)

 let ai = await fetch("/ai",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body: JSON.stringify({text})
 })

 let r = await ai.json()

 bubble(r.text,false)

 new Audio(
  "data:audio/mp3;base64,"+r.audio
 ).play()

 }

 rec.start()
 setTimeout(()=>rec.stop(),2000)

 })

}
</script>

</body>
</html>
